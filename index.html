<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    html, body {
      margin: 0;
      background: #fff;
      font-family: Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* İSİM BLOĞU: artık dev boşluk yok */
    .intro {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0 20px 0; /* ❗ azaltıldı */
    }

    .name {
      text-align: center;
      line-height: 1.0;
      margin: 0;

      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.9s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .regular, .bold {
      font-size: 42px;
      margin: 0;
      padding: 0;
    }

    .regular { font-weight: 400; }
    .bold { font-weight: 700; }

    /* GÖRSELLER */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    img {
      width: 92%;
      margin: 16px auto;
      display: block;
      border-radius: 12px;

      opacity: 0;
      transform: translateY(15px);
      transition: all 0.8s ease;
    }

    img.show {
      opacity: 1;
      transform: translateY(0);
    }

    img:active {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <!-- İSİM -->
  <div class="intro">
    <div class="name">
      <div class="regular">Beril</div>
      <div class="bold">Çekmez</div>
    </div>
  </div>

  <!-- GÖRSELLER -->
  <div class="container">
    <img src="resim1.jpg">
    <img src="resim2.jpg">
    <img src="resim3.jpg">
    <img src="resim4.jpg">
  </div>

  <script>
    const images = document.querySelectorAll("img");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    });

    images.forEach(img => observer.observe(img));
  </script>

</body>
</html>
