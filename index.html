<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #fff;
      font-family: Helvetica, Arial, sans-serif;
    }

    /* Dikey + yatay ortalama */
    .intro {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .name {
      font-size: 42px;
      line-height: 1.2;
    }

    .regular {
      font-weight: 400;
    }

    .bold {
      font-weight: 700;
    }

    /* Görseller */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    img {
      width: 92%;
      margin: 20px auto;
      display: block;
      border-radius: 12px;

      opacity: 0;
      transform: translateY(30px);
      transition: all 0.7s ease;
    }

    img.show {
      opacity: 1;
      transform: translateY(0);
    }

    img:active {
      transform: scale(1.04);
    }
  </style>
</head>

<body>

  <!-- INTRO (isim ekranı) -->
  <div class="intro">
    <div class="name">
      <div class="regular">Beril</div>
      <div class="bold">Çekmez</div>
    </div>
  </div>

  <!-- GÖRSELLER -->
  <div class="container">
    <img src="resim1.jpg">
    <img src="resim2.jpg">
    <img src="resim3.jpg">
    <img src="resim4.jpg">
  </div>

  <script>
    const images = document.querySelectorAll("img");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    });

    images.forEach(img => observer.observe(img));
  </script>

</body>
</html>
